<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - นิติบุคคลเจริญกรุง 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Sarabun', sans-serif; display: flex; align-items: center; min-height: 100vh; }
        .login-card { max-width: 400px; width: 100%; margin: auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-login { padding: 12px; font-weight: bold; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="https://img1.pic.in.th/images/Untitled-design01481aab804c105d.png" style="max-width: 150px;" class="mb-4">
        <h4 class="fw-bold mb-4">ระบบจัดการนิติบุคคล</h4>
        <div class="mb-4">
            <input type="password" id="password" class="form-control form-control-lg text-center" placeholder="ใส่รหัสผ่านแอดมิน">
        </div>
        <button class="btn btn-primary w-100 btn-login" onclick="doLogin()">เข้าสู่ระบบ</button>
        <div class="mt-4">
            <a href="resident/index.html" class="text-decoration-none small text-muted">เข้าสู่ระบบสำหรับลูกบ้าน <i class="bi bi-arrow-right"></i></a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyfjoIoU0viOW4_4NtCmqZ1wLxSYQPQRdAZv7cQIf6-lCMLbDjfpYHYZ28FkSojBeivJA/exec";

        async function doLogin() {
            const pass = document.getElementById('password').value;
            if(!pass) return;

            Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', password: pass })
                });
                const res = await resp.json();

                if (res.success) {
                    // เก็บ Token ไว้ในเครื่องเพื่อยืนยันว่า Login แล้ว
                    localStorage.setItem('admin_token', res.token);
                    Swal.fire({ icon: 'success', title: 'ยินดีต้อนรับ', showConfirmButton: false, timer: 1500 })
                    .then(() => location.href = 'index.html');
                } else {
                    Swal.fire('ผิดพลาด', res.message, 'error');
                }
            } catch (e) {
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อระบบได้', 'error');
            }
        }
    </script>
</body>
</html>
