<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการ PDF - เจริญกรุง คอนโดมิเนียม 3</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #d4af37;
            --gold-soft: rgba(255, 215, 0, 0.15);
        }

        /* 🌑 Premium Dark Theme */
        body {
            font-family: 'Sarabun', sans-serif;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top, #1c2029, #0a0c10 80%);
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 45px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            flex: 1;
            position: relative;
        }

        h1 { font-weight: 700; background: linear-gradient(to bottom, #ffffff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 🏠 Home Button */
        .btn-back-home {
            position: absolute; top: 40px; right: 45px;
            color: #000; font-weight: bold; background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 10px 20px; border-radius: 12px; text-decoration: none; transition: 0.3s;
        }
        .btn-back-home:hover { transform: translateY(-2px); filter: brightness(1.1); color: #000; }

        /* 🔍 Search & Tools Area */
        .tools-area { background: rgba(0, 0, 0, 0.25); padding: 30px; border-radius: 22px; border: 1px solid var(--gold-soft); margin-bottom: 35px; }
        .form-control { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.12); color: #fff; padding: 12px; border-radius: 12px; }
        .form-control:focus { background: rgba(255, 255, 255, 0.08); border-color: var(--gold); box-shadow: 0 0 12px var(--gold-soft); color: #fff; }

        /* 📊 Table Style: Gold & White */
        .table-container { background: rgba(0, 0, 0, 0.15); border-radius: 20px; padding: 10px; border: 1px solid rgba(255,255,255,0.03); }
        .table { background-color: transparent !important; --bs-table-bg: transparent !important; color: #fff !important; }
        .table thead th { background-color: rgba(255, 215, 0, 0.1) !important; color: var(--gold) !important; border-bottom: 2px solid var(--gold-dark) !important; padding: 18px; }
        .table tbody td { color: #ffffff !important; vertical-align: middle; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .text-receipt-no { color: var(--gold) !important; font-weight: 700; font-family: monospace; font-size: 1.1rem; }
        .badge-room { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 12px; border-radius: 8px; }

        /* 🔘 Action Buttons */
        .btn-view-file {
            background-color: rgba(40, 167, 69, 0.15); color: #2ecc71 !important; border: 1px solid #27ae60;
            font-size: 0.85rem; font-weight: 700; border-radius: 10px; padding: 7px 15px;
            text-decoration: none; transition: 0.2s;
        }
        .btn-view-file:hover { background-color: #27ae60; color: white !important; }

        .btn-generate { 
            font-weight: 700; border-radius: 10px; padding: 7px 15px; border: none; transition: 0.3s;
        }
        
        .status-badge { font-size: 0.75rem; padding: 5px 12px; border-radius: 20px; font-weight: bold; }

        /* 🏆 SweetAlert2 Custom Theme */
        .swal2-popup { background: rgba(40, 45, 55, 0.95) !important; backdrop-filter: blur(15px); border: 2px solid var(--gold) !important; border-radius: 25px !important; color: #fff !important; }
        .swal2-title { color: var(--gold) !important; font-family: 'Sarabun', sans-serif !important; }
        .swal2-confirm { background: linear-gradient(135deg, var(--gold), #c9a400) !important; color: #000 !important; font-weight: 700 !important; }

        .footer { text-align: center; color: #666; font-size: 0.85rem; padding: 40px 0; margin-top: auto; }
    </style>
</head>
<body>

<div class="container">
    <a href="https://chaichana-dev-io.github.io/receipt-entry-system/index.html" class="btn-back-home">
        <i class="bi bi-house-door-fill me-1"></i> กลับหน้าหลัก
    </a>

    <h1 class="mb-2"><i class="bi bi-file-earmark-pdf-fill me-2" style="color:var(--gold)"></i>ออกไฟล์ใบเสร็จ (Export)</h1>
    <p class="opacity-50 mb-4">จัดการสร้างและดูไฟล์ PDF สำหรับส่งให้ลูกบ้าน</p>

    <div class="tools-area">
        <div class="row g-3 align-items-center">
            <div class="col-md-6">
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-transparent border-secondary text-warning"><i class="bi bi-search"></i></span>
                    <input type="number" id="roomInput" class="form-control border-secondary text-white" placeholder="ค้นหาตามเลขห้อง...">
                    <button class="btn btn-warning fw-bold px-4" onclick="fetchData()">ค้นหา</button>
                </div>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-outline-secondary me-2 text-white border-secondary" onclick="clearAll()" title="ล้าง">
                    <i class="bi bi-arrow-counterclockwise"></i>
                </button>
                <button class="btn btn-warning fw-bold px-4 shadow-sm" onclick="runBatch()">
                    <i class="bi bi-lightning-charge-fill me-1"></i> สร้าง PDF ทั้งหมดที่ค้าง
                </button>
            </div>
        </div>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">เลขที่ใบเสร็จ</th>
                        <th>ห้อง</th>
                        <th>ชื่อเจ้าของ/ผู้เช่า</th>
                        <th class="text-center">สถานะ</th>
                        <th class="text-end pe-4">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                    <tr>
                        <td colspan="5" class="p-5 text-center text-muted">
                            ระบุเลขห้องเพื่อแสดงรายการใบเสร็จ
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        © 2026 Charoen Krung Condominium 3 | บริหารจัดการโดยนิติบุคคล
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz_LLwjshi1fqnb0lVAcfnAwKZRSRq8UhNRicwaAbhQjft5MyeQdPgmgN6L0E93HVah/exec";

    document.addEventListener('keydown', (e) => {
        if (e.key === "Enter" && document.activeElement.id === "roomInput") fetchData();
        if (e.key === "Escape") clearAll();
    });

    async function fetchData() {
        const room = document.getElementById('roomInput').value;
        const tableBody = document.getElementById('dataTable');
        tableBody.innerHTML = `<tr><td colspan="5" class="text-center p-5"><div class="spinner-border text-warning"></div></td></tr>`;
        try {
            const response = await fetch(`${API_URL}?action=search&room=${room}`);
            const data = await response.json();
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center p-5 opacity-50">ไม่พบข้อมูลใบเสร็จ</td></tr>`;
                return;
            }
            tableBody.innerHTML = "";
            data.reverse().forEach(item => {
                const hasPdf = !!item.pdfUrl;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="ps-4 text-receipt-no">${item['เลขที่ใบเสร็จ']}</td>
                    <td><span class="badge-room">${item['ห้อง']}</span></td>
                    <td class="fw-light">${item['ชื่อเจ้าของ / ผู้เช่า']}</td>
                    <td class="text-center">
                        <span class="status-badge ${hasPdf ? 'bg-success text-white' : 'bg-warning text-dark'}">
                            <i class="bi ${hasPdf ? 'bi-check-circle-fill' : 'bi-clock-history'} me-1"></i>
                            ${hasPdf ? 'ออกไฟล์แล้ว' : 'รอสร้าง'}
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="d-flex justify-content-end align-items-center gap-2">
                            ${hasPdf ? `<a href="${item.pdfUrl}" target="_blank" class="btn-view-file">ดูไฟล์</a>` : ''}
                            <button class="btn btn-sm ${hasPdf ? 'btn-outline-warning' : 'btn-warning'} btn-generate" onclick="generatePdf('${item['เลขที่ใบเสร็จ']}')">
                                ${hasPdf ? 'สร้างใหม่' : 'สร้าง PDF'}
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        } catch (err) { Swal.fire('Error', 'เชื่อมต่อระบบไม่ได้', 'error'); }
    }

    async function generatePdf(receiptNo) {
        Swal.fire({ title: 'กำลังสร้างไฟล์...', background: 'rgba(40,45,55,0.95)', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "generatePDF", receiptNo: receiptNo }) });
            const res = await resp.json();
            if (res.success) {
                Swal.fire({ icon: 'success', title: 'สร้างไฟล์สำเร็จ', confirmButtonColor: '#d4af37' });
                fetchData();
                window.open(res.url, '_blank');
            }
        } catch (e) { Swal.fire('Error', 'สร้างไม่สำเร็จ', 'error'); }
    }

    async function runBatch() {
        const confirm = await Swal.fire({ title: 'ยืนยันสร้าง PDF ทั้งหมด?', text: "ระบบจะสร้างไฟล์เฉพาะรายการที่ยังไม่มี PDF เท่านั้น", icon: 'question', showCancelButton: true });
        if (confirm.isConfirmed) {
            Swal.fire({ title: 'กำลังประมวลผล...', text: 'กรุณารอสักครู่ ระบบกำลังทำงานเบื้องหลัง', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const resp = await fetch(`${API_URL}?action=batch`);
                const res = await resp.json();
                Swal.fire('สำเร็จ', `สร้างเรียบร้อย ${res.count} รายการ`, 'success');
                fetchData();
            } catch (e) { Swal.fire('กำลังทำงาน', 'ระบบกำลังสร้างไฟล์ในพื้นหลัง กรุณาตรวจสอบอีกครั้งใน 1 นาที', 'info'); }
        }
    }

    function clearAll() {
        document.getElementById('roomInput').value = "";
        document.getElementById('dataTable').innerHTML = `<tr><td colspan="5" class="p-5 text-center opacity-50">ระบุเลขห้องเพื่อแสดงรายการใบเสร็จ</td></tr>`;
        document.getElementById('roomInput').focus();
    }
</script>
</body>
</html>
