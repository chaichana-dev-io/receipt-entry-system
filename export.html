<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการใบเสร็จ - เจริญกรุง คอนโดมิเนียม 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Sarabun', sans-serif; }
        .container { max-width: 1000px; margin-top: 0; padding-top: 20px; }
        
        /* 1. Header Section: ทำให้สูงขึ้นเพื่อเลี่ยงการทับซ้อน */
        .header-section { 
            background: linear-gradient(135deg, #0d6efd 0%, #0045ad 100%); 
            color: white; 
            padding: 80px 40px 120px; /* เพิ่ม Padding บนและล่าง */
            border-radius: 24px; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(13, 110, 253, 0.2); 
            text-align: center;
        }
        
        /* ปุ่มกลับหน้าหลัก (บนขวา) */
        .btn-back-home {
            position: absolute;
            top: 25px;
            right: 25px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-back-home:hover { background: rgba(255, 255, 255, 0.25); color: white; transform: translateY(-2px); }

        /* 2. Main Card: ปรับ Margin-top ให้เกยขึ้นไปแค่พอสวยงาม ไม่ทับข้อความ */
        .main-card { 
            margin-top: -60px; /* ลดระยะการเกยขึ้นไป */
            background: white; 
            padding: 35px; 
            border-radius: 20px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); 
            position: relative;
            z-index: 10; /* มั่นใจว่าอยู่ด้านบนสุดเสมอ */
        }

        .btn-action { 
            border-radius: 12px; 
            font-weight: bold; 
            padding: 12px 20px;
            transition: all 0.2s; 
        }
        
        .input-group-lg > .form-control {
            border-radius: 12px;
        }

        .status-badge { font-size: 0.8rem; padding: 6px 14px; border-radius: 20px; font-weight: bold; }
        
        /* ตาราง */
        .table-container {
            background: white;
            border-radius: 20px;
            margin-top: 30px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <a href="https://chaichana-dev-io.github.io/receipt-entry-system/index.html" class="btn-back-home">
            <i class="bi bi-house-door-fill"></i> กลับหน้าหลัก
        </a>
        <h1 class="fw-bold mb-2" style="font-size: 2.2rem;">
            <i class="bi bi-file-earmark-pdf-fill me-2"></i> ระบบจัดการใบเสร็จ
        </h1>
        <p class="mb-0 fs-5 opacity-75">ตรวจสอบสถานะและออกไฟล์ใบเสร็จรับเงินสำหรับลูกบ้าน</p>
    </div>

    <div class="main-card mx-auto" style="max-width: 900px;">
        <div class="row g-3 align-items-center">
            <div class="col-lg-7">
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-light border-end-0 text-primary">
                        <i class="bi bi-search"></i>
                    </span>
                    <input type="number" id="roomInput" class="form-control bg-light border-start-0 ps-0" placeholder="ระบุเลขห้องเพื่อค้นหา...">
                </div>
            </div>
            
            <div class="col-lg-5">
                <div class="d-flex gap-2">
                    <button class="btn btn-primary btn-action flex-grow-1 shadow-sm" onclick="fetchData()">
                        <i class="bi bi-search me-2"></i>ค้นหา
                    </button>
                    <button class="btn btn-outline-secondary btn-action shadow-sm" onclick="clearAll()" title="ล้างข้อมูล">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>
                    <button class="btn btn-warning btn-action shadow-sm text-dark" onclick="runBatch()" title="สร้าง PDF ที่ค้างอยู่ทั้งหมด">
                        <i class="bi bi-lightning-charge-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3">เลขที่ใบเสร็จ</th>
                        <th>ห้อง</th>
                        <th>ชื่อเจ้าของ/ผู้เช่า</th>
                        <th>วันที่บันทึก</th>
                        <th class="text-center">สถานะ</th>
                        <th class="text-end pe-4">จัดการ</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                    <tr>
                        <td colspan="6" class="p-5 text-center text-muted">
                            <i class="bi bi-search display-1 d-block mb-3 opacity-10"></i>
                            ระบุเลขห้องด้านบนเพื่อค้นหาข้อมูลใบเสร็จ
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center mt-5 mb-4 text-muted small">
        © 2026 Charoen Krung Condominium 3 | บริหารจัดการโดยนิติบุคคล
    </div>
</div>

<script>
    // URL และฟังก์ชัน JavaScript เดิมของคุณทั้งหมด (คงเดิมไว้เพราะทำงานได้ดีอยู่แล้ว)
    const API_URL = "https://script.google.com/macros/s/AKfycbz_LLwjshi1fqnb0lVAcfnAwKZRSRq8UhNRicwaAbhQjft5MyeQdPgmgN6L0E93HVah/exec";

    document.addEventListener('keydown', (e) => {
        if (e.key === "Enter" && document.activeElement.id === "roomInput") fetchData();
        if (e.key === "Escape") clearAll();
    });

    async function fetchData() {
        const room = document.getElementById('roomInput').value;
        const tableBody = document.getElementById('dataTable');
        tableBody.innerHTML = `<tr><td colspan="6" class="text-center p-5"><div class="spinner-border text-primary"></div></td></tr>`;
        try {
            const response = await fetch(`${API_URL}?action=search&room=${room}`);
            const data = await response.json();
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-5 text-center text-muted">ไม่พบข้อมูลใบเสร็จ</td></tr>`;
                return;
            }
            tableBody.innerHTML = "";
            data.forEach(item => {
                const hasPdf = !!item.pdfUrl;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="ps-4 fw-bold text-primary">${item['เลขที่ใบเสร็จ']}</td>
                    <td><span class="badge bg-light text-dark border px-3">${item['ห้อง']}</span></td>
                    <td>${item['ชื่อเจ้าของ / ผู้เช่า']}</td>
                    <td><small class="text-muted">${item['dateDisplay']}</small></td>
                    <td class="text-center">
                        <span class="status-badge ${hasPdf ? 'bg-success-subtle text-success' : 'bg-warning-subtle text-warning'}">
                            <i class="bi ${hasPdf ? 'bi-check-circle-fill' : 'bi-clock-history'} me-1"></i>
                            ${hasPdf ? 'ออกไฟล์แล้ว' : 'รอการสร้าง'}
                        </span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="d-flex justify-content-end gap-1">
                            ${hasPdf ? `<a href="${item.pdfUrl}" target="_blank" class="btn btn-sm btn-outline-success border-0"><i class="bi bi-eye-fill"></i></a>` : ''}
                            <button class="btn btn-sm ${hasPdf ? 'btn-light text-primary' : 'btn-primary'} btn-action px-3" onclick="generatePdf('${item['เลขที่ใบเสร็จ']}')">
                                ${hasPdf ? 'สร้างใหม่' : 'สร้าง PDF'}
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        } catch (err) { Swal.fire('Error', 'เชื่อมต่อผิดพลาด', 'error'); }
    }

    async function generatePdf(receiptNo) {
        Swal.fire({ title: 'กำลังสร้าง PDF...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const resp = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "generatePDF", receiptNo: receiptNo }) });
            const res = await resp.json();
            if (res.success) {
                Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1500 });
                fetchData();
                window.open(res.url, '_blank');
            }
        } catch (e) { Swal.fire('Error', 'สร้างไม่สำเร็จ', 'error'); }
    }

    async function runBatch() {
        const confirm = await Swal.fire({ title: 'สร้าง PDF ทั้งหมดที่ค้างอยู่?', text: "ระบบจะสร้างไฟล์เฉพาะรายการที่ยังไม่มี PDF เท่านั้น", icon: 'question', showCancelButton: true });
        if (confirm.isConfirmed) {
            Swal.fire({ title: 'กำลังดำเนินการ...', text: 'ห้ามปิดหน้าจอจนกว่าจะเสร็จสิ้น', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const resp = await fetch(`${API_URL}?action=batch`);
                const res = await resp.json();
                Swal.fire('สำเร็จ', `สร้างเรียบร้อย ${res.count} รายการ`, 'success');
                fetchData();
            } catch (e) { Swal.fire('Info', 'ระบบทำงานเบื้องหลังต่อ กรุณาตรวจสอบใน Sheet', 'info'); }
        }
    }

    function clearAll() {
        document.getElementById('roomInput').value = "";
        document.getElementById('dataTable').innerHTML = `<tr><td colspan="6" class="p-5 text-center text-muted"><i class="bi bi-search display-1 d-block mb-3 opacity-10"></i>ระบุเลขห้องด้านบนเพื่อค้นหาข้อมูลใบเสร็จ</td></tr>`;
        document.getElementById('roomInput').focus();
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
