<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแก้ไขข้อมูล - นิติบุคคล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            background-color: #fff9e6; 
            font-family: 'Sarabun', sans-serif; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container { 
            max-width: 1000px; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.1); 
            position: relative;
            flex: 1;
        }
        h2 { color: #f39c12; font-weight: 700; margin-bottom: 30px; }
        
        .receipt-badge { 
            position: absolute; 
            top: 30px; 
            right: 30px; 
            background: #f39c12; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 10px; 
            text-align: right; 
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            user-select: none;
        }
        .receipt-badge:hover { opacity: 0.9; }
        .receipt-badge:active { transform: scale(0.98); }

        .section-title { background: #fcf3cf; padding: 10px; border-left: 5px solid #f39c12; font-weight: bold; margin-top: 25px; margin-bottom: 15px; color: #333; }
        .readonly-field { background-color: #e9ecef !important; font-weight: bold; color: #d35400; }
        .btn-submit { padding: 15px; font-size: 1.2rem; font-weight: bold; margin-top: 20px; border-radius: 10px; background-color: #f39c12; border: none; color: white; }
        .btn-submit:hover { background-color: #e67e22; }
        input[type=number] { text-align: right; }
        .total-highlight { color: #e67e22 !important; border-color: #f39c12 !important; }
        .search-area { background: #fef5e7; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #fad7a0; }

        /* ส่วน Footer สีเทา ตรงกลาง */
        .footer {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            padding: 20px 0;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="receipt-badge" onclick="location.href='https://chaichana-dev-io.github.io/receipt-entry-system/entry'" title="กลับหน้าบันทึกข้อมูล">
        <small>แก้ไขใบเสร็จเลขที่</small><br>
        <span id="receiptNoDisplay">- รอรันเลข -</span>
    </div>

    <h2><i class="bi bi-pencil-square"></i> แก้ไขข้อมูลใบเสร็จ (Admin)</h2>
    <hr>

    <div class="search-area">
        <label class="form-label fw-bold text-dark">ระบุเลขที่ใบเสร็จที่ต้องการแก้ไข (PK)</label>
        <div class="input-group input-group-lg">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-warning"></i></span>
            <input type="text" id="searchReceiptNo" class="form-control border-start-0 ps-0" placeholder="ระบุเลขที่ใบเสร็จแล้วกด Enter...">
            <button class="btn btn-warning fw-bold px-4" onclick="loadReceiptData()">ดึงข้อมูลมาแก้ไข</button>
        </div>
        <small class="text-muted mt-2 d-block">* กด Enter เพื่อค้นหา / กด Esc เพื่อล้างหน้าจอ</small>
    </div>
    
    <form id="receiptForm" style="display:none;">
        <input type="hidden" name="action" value="updateData">
        <input type="hidden" name="receiptNo" id="receiptNo">
        <input type="hidden" name="period" id="finalPeriod">

        <div class="row">
            <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">ห้อง (เลขที่)</label>
                <input type="text" name="room" id="room" class="form-control readonly-field" readonly>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">ชื่อเจ้าของ / ผู้เช่า</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="ระบุชื่อ">
            </div>
        </div>

        <div class="section-title">1. ค่าส่วนกลาง</div>
        <div class="row align-items-end">
            <div class="col-md-3 mb-3">
                <label class="form-label">เดือนเริ่มต้น</label>
                <select id="periodStart" class="form-select" onchange="calculate()">
                    <option value="">- เลือกเดือน -</option>
                    <option value="มกราคม">มกราคม</option><option value="กุมภาพันธ์">กุมภาพันธ์</option>
                    <option value="มีนาคม">มีนาคม</option><option value="เมษายน">เมษายน</option>
                    <option value="พฤษภาคม">พฤษภาคม</option><option value="มิถุนายน">มิถุนายน</option>
                    <option value="กรกฎาคม">กรกฎาคม</option><option value="สิงหาคม">สิงหาคม</option>
                    <option value="กันยายน">กันยายน</option><option value="ตุลาคม">ตุลาคม</option>
                    <option value="พฤศจิกายน">พฤศจิกายน</option><option value="ธันวาคม">ธันวาคม</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">ถึงเดือน (ไม่บังคับ)</label>
                <select id="periodEnd" class="form-select" onchange="calculate()">
                    <option value="">- เลือกเดือน -</option>
                    <option value="มกราคม">มกราคม</option><option value="กุมภาพันธ์">กุมภาพันธ์</option>
                    <option value="มีนาคม">มีนาคม</option><option value="เมษายน">เมษายน</option>
                    <option value="พฤษภาคม">พฤษภาคม</option><option value="มิถุนายน">มิถุนายน</option>
                    <option value="กรกฎาคม">กรกฎาคม</option><option value="สิงหาคม">สิงหาคม</option>
                    <option value="กันยายน">กันยายน</option><option value="ตุลาคม">ตุลาคม</option>
                    <option value="พฤศจิกายน">พฤศจิกายน</option><option value="ธันวาคม">ธันวาคม</option>
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">พื้นที่ (ตรม.)</label>
                <input type="number" step="0.01" name="sqm" id="sqm" class="form-control" oninput="calculate()">
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label text-warning font-weight-bold">ค่าส่วนกลาง <span id="monthCountBadge" class="badge bg-secondary ms-1">0 เดือน</span></label>
                <input type="number" name="commonFee" id="commonFee" class="form-control readonly-field" readonly tabindex="-1">
            </div>
        </div>

        <div class="section-title">2. ค่าน้ำประปา</div>
        <div class="row bg-light p-3 rounded mb-3 border">
            <div class="col-md-3 mb-3"><label class="form-label small fw-bold">ค่าน้ำประจำเดือน</label><select name="waterMonth" id="waterMonth" class="form-select"><option value="">- เลือกเดือน -</option><option value="มกราคม">มกราคม</option><option value="กุมภาพันธ์">กุมภาพันธ์</option><option value="มีนาคม">มีนาคม</option><option value="เมษายน">เมษายน</option><option value="พฤษภาคม">พฤษภาคม</option><option value="มิถุนายน">มิถุนายน</option><option value="กรกฎาคม">กรกฎาคม</option><option value="สิงหาคม">สิงหาคม</option><option value="กันยายน">กันยายน</option><option value="ตุลาคม">ตุลาคม</option><option value="พฤศจิกายน">พฤศจิกายน</option><option value="ธันวาคม">ธันวาคม</option></select></div>
            <div class="col-md-3 mb-3"><label class="form-label small fw-bold">ค่าน้ำปี (พ.ศ.)</label><input type="number" name="waterYear" id="waterYear" class="form-control"></div>
            <div class="col-md-3 mb-3"><label class="form-label">เลขมิเตอร์ก่อน</label><input type="number" name="prevMeter" id="prevMeter" class="form-control" oninput="calculate()"></div>
            <div class="col-md-3 mb-3"><label class="form-label">เลขมิเตอร์ปัจจุบัน</label><input type="number" name="currMeter" id="currMeter" class="form-control" oninput="calculate()"></div>
            <div class="col-md-3 mb-3"><label class="form-label">หน่วยที่ใช้</label><input type="number" name="waterUnit" id="waterUnit" class="form-control readonly-field" readonly tabindex="-1"></div>
            <div class="col-md-3 mb-3"><label class="form-label text-warning font-weight-bold">ค่าน้ำ</label><input type="number" name="waterFee" id="waterFee" class="form-control readonly-field" readonly tabindex="-1"></div>
        </div>

        <div class="section-title">3. ค่าใช้จ่ายอื่นๆ และที่จอดรถ</div>
        <div class="row">
            <div class="col-md-2 mb-3"><label class="form-label">มิเตอร์น้ำ/จัดการขยะ</label><input type="number" name="meter" id="meter" class="form-control readonly-field" readonly tabindex="-1"></div>
            <div class="col-md-2 mb-3"><label class="form-label">จำนวนเงิน</label><input type="number" name="total_input" id="total_input" class="form-control readonly-field" readonly tabindex="-1"></div>
            <div class="col-md-2 mb-3"><label class="form-label">รถยนต์ (คัน)</label><input type="number" name="car" id="car" class="form-control" oninput="calculate()"></div>
            <div class="col-md-2 mb-3"><label class="form-label">รวมจอดรถ</label><input type="number" name="sumCar" id="sumCar" class="form-control readonly-field" readonly tabindex="-1"></div>
            <div class="col-md-2 mb-3"><label class="form-label">MC (คัน)</label><input type="number" name="mc" id="mc" class="form-control" oninput="calculate()"></div>
            <div class="col-md-2 mb-3"><label class="form-label">รวมจอด MC</label><input type="number" name="sumMc" id="sumMc" class="form-control readonly-field" readonly tabindex="-1"></div>
        </div>
        
        <div class="row bg-light p-3 rounded mb-3">
            <div class="col-md-4 mb-2"><label class="form-label fw-bold text-danger">เหตุผลแก้ไข (ถ้ามี)</label><input type="text" name="reason" id="reason" class="form-control" placeholder="ระบุเหตุผล..."></div>
            <div class="col-md-2 mb-2"><label class="form-label">อื่นๆ (บาท)</label><input type="number" name="other" id="other" class="form-control" oninput="calculate()"></div>
            <div class="col-md-6 mb-2">
                <label class="form-label fw-bold text-warning">ยอดรวมสุทธิ</label>
                <input type="number" name="grandTotal" id="grandTotal" class="form-control readonly-field total-highlight" readonly tabindex="-1">
            </div>
            <div class="col-md-12 mt-2">
                <label class="form-label fw-bold">ตัวอักษรไทย</label>
                <input type="text" name="bahtText" id="bahtText" class="form-control readonly-field text-center" readonly tabindex="-1">
            </div>
        </div>

        <div class="section-title">4. วิธีการชำระเงิน</div>
        <div class="mb-3">
            <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="payType" id="p1" value="เงินสด" checked onchange="togglePayFields()"> <label class="form-check-label" for="p1">เงินสด</label></div>
            <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="payType" id="p2" value="เงินโอน" onchange="togglePayFields()"> <label class="form-check-label" for="p2">เงินโอน</label></div>
            <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="payType" id="p3" value="เช็ค" onchange="togglePayFields()"> <label class="form-check-label" for="p3">เช็ค</label></div>
        </div>

        <div id="v_fields" style="display:none;" class="p-3 border rounded mb-3 bg-light">
            <div class="row align-items-center"><div class="col-auto"><label class="fw-bold mb-0">วันที่โอน:</label></div><div class="col-auto"><input type="date" name="transferDate" id="transferDate" class="form-control d-inline-block" style="width: 200px;"></div></div>
        </div>

        <div id="w_fields" style="display:none;" class="p-3 border rounded mb-3 bg-light">
            <div class="row">
                <div class="col-md-3 mb-2"><label class="small fw-bold">ธนาคาร</label><input type="text" name="bankName" id="bankName" class="form-control"></div>
                <div class="col-md-3 mb-2"><label class="small fw-bold">สาขา</label><input type="text" name="bankBranch" id="bankBranch" class="form-control"></div>
                <div class="col-md-3 mb-2"><label class="small fw-bold">เลขที่เช็ค</label><input type="text" name="chequeNo" id="chequeNo" class="form-control"></div>
                <div class="col-md-3 mb-2"><label class="small fw-bold">ลงวันที่ในเช็ค</label><input type="date" name="chequeDate" id="chequeDate" class="form-control"></div>
            </div>
        </div>

        <div class="section-title">5. รายการค้างชำระ (ถ้ามี)</div>
        <div class="row mb-2">
            <div class="col-md-4"><label class="form-label small">ส่วนกลางค้าง (บาท)</label><input type="number" name="unpaidCommon" id="unpaidCommon" class="form-control"></div>
            <div class="col-md-4"><label class="form-label small">เดือนที่ค้าง</label><input type="text" name="unpaidMonth" id="unpaidMonth" class="form-control"></div>
            <div class="col-md-4"><label class="form-label small">ปีที่ค้าง (พ.ศ.)</label><input type="number" name="unpaidYear" id="unpaidYear" class="form-control"></div>
        </div>
        <div class="row">
            <div class="col-md-4"><label class="form-label small">ค่าน้ำค้าง (บาท)</label><input type="number" name="unpaidWater" id="unpaidWater" class="form-control"></div>
            <div class="col-md-4"><label class="form-label small">เดือนที่ค้างน้ำ</label><input type="text" name="unpaidWaterMonth" id="unpaidWaterMonth" class="form-control"></div>
            <div class="col-md-4"><label class="form-label small">ปีค้างน้ำ (พ.ศ.)</label><input type="number" name="unpaidWaterYear" id="unpaidWaterYear" class="form-control"></div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-warning w-100 btn-submit">อัปเดตข้อมูลใบเสร็จ</button>
    </form>
    <div id="loader" style="display:none;" class="text-center mt-3 text-warning fw-bold">กำลังประมวลผล...</div>
</div>

<div class="footer">
    © 2026 Charoen Krung Condominium 3 | บริหารจัดการโดยนิติบุคคล
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzJC9xneV9_lpvJOVzPV8QtLL0fidns8pLtnZQGYEOrsag4BzYAQVguGz6z9ANke8Rd6Q/exec";
    const THAI_MONTHS = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

    document.addEventListener('keydown', (e) => {
        if (e.key === "Enter" && document.activeElement.id === "searchReceiptNo") loadReceiptData();
        if (e.key === "Escape") clearForm();
    });

    async function loadReceiptData() {
        const receiptNo = document.getElementById('searchReceiptNo').value.trim();
        if (!receiptNo) return Swal.fire('ระบุเลขใบเสร็จ', '', 'warning');
        Swal.fire({ title: 'กำลังค้นหา...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getReceiptData&receiptNo=${receiptNo}`);
            const data = await res.json();
            if (!data) {
                Swal.fire('ไม่พบข้อมูล', 'กรุณาตรวจสอบเลขใบเสร็จอีกครั้ง', 'error');
                document.getElementById('receiptForm').style.display = 'none';
                return;
            }
            document.getElementById('receiptNo').value = data['เลขที่ใบเสร็จ'];
            document.getElementById('receiptNoDisplay').innerText = data['เลขที่ใบเสร็จ'];
            document.getElementById('room').value = data['ห้อง'];
            document.getElementById('name').value = data['ชื่อเจ้าของ / ผู้เช่า'];
            document.getElementById('sqm').value = data['ตารางเมตร'];
            document.getElementById('waterMonth').value = data['เดือนค่าน้ำ'];
            document.getElementById('waterYear').value = data['ปีค่าน้ำ'];
            document.getElementById('prevMeter').value = data['มิเตอร์ครั้งก่อน'];
            document.getElementById('currMeter').value = data['มิเตอร์ปัจจุบัน'];
            document.getElementById('meter').value = data['มิเตอร์'];
            document.getElementById('total_input').value = data['ยอด'];
            document.getElementById('car').value = data['CAR'];
            document.getElementById('mc').value = data['MC'];
            document.getElementById('reason').value = data['เหตุผล'];
            document.getElementById('other').value = data['อื่นๆ'];
            document.getElementById('unpaidCommon').value = data['ส่วนกลางค้าง'];
            document.getElementById('unpaidMonth').value = data['เดือนค้าง'];
            document.getElementById('unpaidYear').value = data['ปีค้าง'];
            document.getElementById('unpaidWater').value = data['ค่าน้ำค้าง'];
            document.getElementById('unpaidWaterMonth').value = data['ค้างค่าน้ำเดือน'];
            document.getElementById('unpaidWaterYear').value = data['ค้างค่าน้ำปี'];
            const pStr = data['ส่วนกลางเดือน'];
            if (pStr && pStr.includes(" - ")) {
                const parts = pStr.split(" - ");
                document.getElementById('periodStart').value = parts[0].trim();
                document.getElementById('periodEnd').value = parts[1].trim();
            } else {
                document.getElementById('periodStart').value = pStr;
                document.getElementById('periodEnd').value = "";
            }
            const parseDate = (dStr) => {
                if(!dStr || dStr === "-") return "";
                const p = dStr.split('/');
                return p.length === 3 ? `${parseInt(p[2])-543}-${p[1]}-${p[0]}` : "";
            };
            document.getElementById('transferDate').value = parseDate(data['โอนวันที่']);
            document.getElementById('chequeDate').value = parseDate(data['ลงวันที่']);
            if(data['U'] === "☑") document.getElementById('p1').checked = true;
            else if(data['V'] === "☑") document.getElementById('p2').checked = true;
            else if(data['W'] === "☑") document.getElementById('p3').checked = true;
            togglePayFields();
            calculate();
            document.getElementById('receiptForm').style.display = 'block';
            Swal.close();
        } catch (e) {
            Swal.fire('Error', 'การเชื่อมต่อผิดพลาด', 'error');
        }
    }

    function togglePayFields() {
        const type = document.querySelector('input[name="payType"]:checked').value;
        document.getElementById('v_fields').style.display = (type === 'เงินโอน') ? 'block' : 'none';
        document.getElementById('w_fields').style.display = (type === 'เช็ค') ? 'block' : 'none';
    }

    function calculate() {
        const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
        const startM = document.getElementById('periodStart').value;
        const endM = document.getElementById('periodEnd').value;
        let monthCount = 0;
        if (startM) {
            monthCount = 1;
            if (endM) {
                const idxStart = THAI_MONTHS.indexOf(startM);
                const idxEnd = THAI_MONTHS.indexOf(endM);
                if (idxStart !== -1 && idxEnd !== -1) {
                    monthCount = idxEnd >= idxStart ? (idxEnd - idxStart) + 1 : (12 - idxStart + idxEnd) + 1;
                }
            }
        }
        document.getElementById('monthCountBadge').innerText = `${monthCount} เดือน`;
        const commonFee = getVal('sqm') * 25 * monthCount;
        document.getElementById('commonFee').value = commonFee > 0 ? commonFee.toFixed(2) : "";
        const unit = Math.max(0, getVal('currMeter') - getVal('prevMeter'));
        const waterFee = unit * 18;
        document.getElementById('waterUnit').value = unit > 0 ? unit : "";
        document.getElementById('waterFee').value = waterFee > 0 ? waterFee.toFixed(2) : "";
        const sumCar = getVal('car') * 500;
        const sumMc = getVal('mc') * 100;
        const grandTotal = commonFee + waterFee + sumCar + sumMc + getVal('total_input') + getVal('other');
        document.getElementById('grandTotal').value = grandTotal > 0 ? grandTotal.toFixed(2) : "";
        document.getElementById('bahtText').value = grandTotal > 0 ? ThaiBahtText(grandTotal) : "";
        document.getElementById('sumCar').value = sumCar > 0 ? sumCar.toFixed(2) : "";
        document.getElementById('sumMc').value = sumMc > 0 ? sumMc.toFixed(2) : "";
    }

    function ThaiBahtText(num) {
        if (!num || num === 0) return "";
        num = num.toFixed(2).split('.');
        let t1 = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
        let t2 = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน", "ล้าน"];
        let res = "";
        function read(n) {
            let s = "";
            for (let i = 0; i < n.length; i++) {
                let d = parseInt(n[i]); let p = n.length - i - 1;
                if (d !== 0) {
                    if (p % 6 === 1 && d === 1) s += "เอ็ด"; 
                    else if (p % 6 === 1 && d === 2) s += "ยี่";
                    else if (p % 6 === 0 && d === 1 && i > 0 && n.length > 1) s += "เอ็ด";
                    else s += t1[d];
                    s += t2[p % 6];
                    if (p >= 6 && p % 6 === 0) s += "ล้าน";
                }
            }
            return s;
        }
        res = (num[0] === "0") ? "ศูนย์บาท" : read(num[0]) + "บาท";
        res += (num[1] === "00") ? "ถ้วน" : read(num[1]) + "สตางค์";
        return res.replace("หนึ่งสิบ", "สิบ");
    }

    function clearForm() {
        document.getElementById('receiptForm').reset();
        document.getElementById('receiptForm').style.display = 'none';
        document.getElementById('searchReceiptNo').value = "";
        document.getElementById('receiptNoDisplay').innerText = "- รอรันเลข -";
        document.getElementById('searchReceiptNo').focus();
    }

    document.getElementById('receiptForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const startM = document.getElementById('periodStart').value;
        const endM = document.getElementById('periodEnd').value;
        document.getElementById('finalPeriod').value = (startM && endM) ? `${startM} - ${endM}` : startM;
        const { isConfirmed } = await Swal.fire({ title: 'ยืนยันการบันทึกแก้ไข?', text: 'ข้อมูลเดิมในชีตจะถูกเขียนทับ', icon: 'warning', showCancelButton: true });
        if (!isConfirmed) return;
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('loader').style.display = 'block';
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        try {
            const resp = await fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) });
            const res = await resp.json();
            if (res.result === "success") {
                Swal.fire({ title: 'แก้ไขสำเร็จ!', icon: 'success', timer: 1500 });
                clearForm();
            }
        } catch (error) {
            Swal.fire('สำเร็จ', 'บันทึกเรียบร้อย', 'success');
            clearForm();
        } finally {
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('loader').style.display = 'none';
        }
    });
</script>
</body>
</html>
